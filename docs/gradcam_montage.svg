<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320" font-family="system-ui, Segoe UI, sans-serif">
  <title>Grad-CAM montage schematic</title>
  <rect width="560" height="320" fill="#fafafa"/>
  <text x="280" y="26" font-weight="600" font-size="15" text-anchor="middle" fill="#1a1a1a">Grad-CAM overlays (denseblock4, illustrative layout)</text>
  <text x="280" y="44" font-size="11" text-anchor="middle" fill="#555">ClassifierOutputTarget · heatmap resized over 224×224 input</text>
  <g transform="translate(24,62)">
    <g transform="translate(0,0)">
      <rect width="116" height="116" rx="6" fill="#dfe8f3"/>
      <rect width="116" height="116" rx="6" fill="url(#cam1)" opacity="0.72"/>
      <text x="58" y="134" font-size="10" text-anchor="middle" fill="#444">Original</text>
    </g>
    <g transform="translate(132,0)">
      <rect width="116" height="116" rx="6" fill="#dfe8f3"/>
      <ellipse cx="58" cy="58" rx="48" ry="42" fill="#e6550d" opacity="0.45"/>
      <text x="58" y="134" font-size="10" text-anchor="middle" fill="#444">CAM · CNV</text>
    </g>
    <g transform="translate(264,0)">
      <rect width="116" height="116" rx="6" fill="#dfe8f3"/>
      <path d="M20 58 L96 58 L78 96 Z" fill="#3182bd" opacity="0.5"/>
      <text x="58" y="134" font-size="10" text-anchor="middle" fill="#444">CAM · DME</text>
    </g>
    <g transform="translate(396,0)">
      <rect width="116" height="116" rx="6" fill="#dfe8f3"/>
      <rect x="28" y="28" width="60" height="60" rx="4" fill="#31a354" opacity="0.4"/>
      <text x="58" y="134" font-size="10" text-anchor="middle" fill="#444">CAM · NORMAL</text>
    </g>
  </g>
  <defs>
    <radialGradient id="cam1" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#fdd0a2"/><stop offset="100%" style="stop-color:#f16913;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <text x="280" y="298" font-size="10" text-anchor="middle" fill="#666">Run the Grad-CAM section in notebooks/oct-classification.ipynb for PNGs from your checkpoint.</text>
</svg>
