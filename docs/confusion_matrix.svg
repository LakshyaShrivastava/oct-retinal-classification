<svg xmlns="http://www.w3.org/2000/svg" width="440" height="400" viewBox="0 0 440 400" font-family="system-ui, Segoe UI, sans-serif">
  <title>Representative confusion matrix (fine-tuned DenseNet run)</title>
  <defs>
    <linearGradient id="heat" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7fbff"/><stop offset="100%" style="stop-color:#08519c"/>
    </linearGradient>
  </defs>
  <rect width="440" height="400" fill="#fafafa"/>
  <text x="220" y="28" font-size="15" font-weight="600" text-anchor="middle" fill="#1a1a1a">Confusion matrix (normalized, illustrative)</text>
  <text x="220" y="46" font-size="11" text-anchor="middle" fill="#555">Fine-tuned DenseNet-121 · 4-class OCT (CNV / DME / DRUSEN / NORMAL)</text>
  <!-- matrix cells row-major: rows = true label -->
  <!-- cell size 72, gap 4, origin 120,110 -->
  <g transform="translate(120,74)">
    <text x="-8" y="44" font-size="10" text-anchor="end" fill="#333">CNV</text>
    <text x="-8" y="116" font-size="10" text-anchor="end" fill="#333">DME</text>
    <text x="-8" y="188" font-size="10" text-anchor="end" fill="#333">DRUSEN</text>
    <text x="-8" y="260" font-size="10" text-anchor="end" fill="#333">NORMAL</text>
    <text x="36" y="-6" font-size="10" text-anchor="middle" fill="#333">CNV</text>
    <text x="112" y="-6" font-size="10" text-anchor="middle" fill="#333">DME</text>
    <text x="188" y="-6" font-size="10" text-anchor="middle" fill="#333">DRUSEN</text>
    <text x="264" y="-6" font-size="10" text-anchor="middle" fill="#333">NORMAL</text>
    <!-- values roughly high on diagonal -->
    <rect x="0" y="0" width="72" height="72" fill="#2171b5"/><text x="36" y="42" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">0.94</text>
    <rect x="76" y="0" width="72" height="72" fill="#bdd7e7"/><text x="112" y="42" fill="#08306b" font-size="13" text-anchor="middle">0.03</text>
    <rect x="152" y="0" width="72" height="72" fill="#deebf7"/><text x="188" y="42" fill="#08306b" font-size="13" text-anchor="middle">0.02</text>
    <rect x="228" y="0" width="72" height="72" fill="#eff3ff"/><text x="264" y="42" fill="#08306b" font-size="12" text-anchor="middle">0.01</text>
    <rect x="0" y="76" width="72" height="72" fill="#c6dbef"/><text x="36" y="118" fill="#08306b" font-size="13" text-anchor="middle">0.04</text>
    <rect x="76" y="76" width="72" height="72" fill="#2171b5"/><text x="112" y="118" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">0.92</text>
    <rect x="152" y="76" width="72" height="72" fill="#bdd7e7"/><text x="188" y="118" fill="#08306b" font-size="13" text-anchor="middle">0.03</text>
    <rect x="228" y="76" width="72" height="72" fill="#eff3ff"/><text x="264" y="118" fill="#08306b" font-size="12" text-anchor="middle">0.01</text>
    <rect x="0" y="152" width="72" height="72" fill="#eff3ff"/><text x="36" y="194" fill="#08306b" font-size="12" text-anchor="middle">0.02</text>
    <rect x="76" y="152" width="72" height="72" fill="#bdd7e7"/><text x="112" y="194" fill="#08306b" font-size="13" text-anchor="middle">0.04</text>
    <rect x="152" y="152" width="72" height="72" fill="#2171b5"/><text x="188" y="194" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">0.91</text>
    <rect x="228" y="152" width="72" height="72" fill="#bdd7e7"/><text x="264" y="194" fill="#08306b" font-size="13" text-anchor="middle">0.03</text>
    <rect x="0" y="228" width="72" height="72" fill="#eff3ff"/><text x="36" y="270" fill="#08306b" font-size="12" text-anchor="middle">0.01</text>
    <rect x="76" y="228" width="72" height="72" fill="#bdd7e7"/><text x="112" y="270" fill="#08306b" font-size="13" text-anchor="middle">0.02</text>
    <rect x="152" y="228" width="72" height="72" fill="#bdd7e7"/><text x="188" y="270" fill="#08306b" font-size="13" text-anchor="middle">0.03</text>
    <rect x="228" y="228" width="72" height="72" fill="#2171b5"/><text x="264" y="270" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">0.94</text>
  </g>
  <text x="220" y="392" font-size="10" text-anchor="middle" fill="#666">Notebook reports actual matrices per run  see W&B and executed cells.</text>
</svg>
